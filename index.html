<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMFAU - Cinema</title>
  <meta property="og:site_name" content="FMFAU" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://fmfau.github.io/Images/Logo%20Tran.png" id="ogImage" />
  <meta property="og:title" content="FMFAU - Cinema" id="ogTitle" />
  <meta property="og:description" content="Immerse yourself in Cinema" id="ogDescription" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #e5e7eb;
      font-family: 'Roboto', sans-serif;
      overflow-x: hidden;
      margin: 0;
    }
    .light body {
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #1f2937;
    }
    .glow-effect {
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), 0 0 30px rgba(59, 130, 246, 0.3);
    }
    .card-glow {
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-glow::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .card-glow:hover::before {
      opacity: 1;
    }
    .card-glow:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.7);
    }
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 50;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .modal-backdrop::-webkit-scrollbar {
      width: 8px;
    }
    .modal-backdrop::-webkit-scrollbar-track {
      background: #1f2937;
    }
    .modal-backdrop::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 4px;
    }
    .modal-content {
      background: linear-gradient(145deg, #1f2937 0%, #111827 100%);
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .score-ring {
      transform: rotate(-90deg);
      transform-origin: center;
    }
    .score-circle {
      transition: stroke-dasharray 0.5s ease, stroke 0.5s ease;
    }
    .score-container {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .score-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 5px rgba(59, 130, 246, 0.8);
    }
    .skeleton {
      background: linear-gradient(90deg, #4b5563 25%, #6b7280 50%, #4b5563 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite linear;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .episode-list {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .episode-list::-webkit-scrollbar {
      width: 8px;
    }
    .episode-list::-webkit-scrollbar-track {
      background: #1f2937;
    }
    .episode-list::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 4px;
    }
    .embed-preview {
      border-left: 4px solid #5865F2;
      padding-left: 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 8px;
    }
    .offline-message {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f59e0b;
      color: #1f2937;
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 1000;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    .tooltip {
      visibility: hidden;
      position: fixed;
      background: #1f2937;
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 100;
      transition: opacity 0.2s ease;
      opacity: 0;
    }
    .relative:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }
    .relative .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px;
      border-style: solid;
      border-color: #1f2937 transparent transparent transparent;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-container img {
      height: 48px;
      width: auto;
      transition: transform 0.3s ease;
    }
    .logo-container img:hover {
      transform: scale(1.1);
    }
    .header {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .search-bar {
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.2);
      transition: all 0.3s ease;
    }
    .search-bar:focus {
      border-color: #3b82f6;
      box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.5);
    }
    .search-btn {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
      transition: all 0.3s ease;
    }
    .search-btn:hover {
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.7);
    }
    .filter-btn {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid rgba(59, 130, 246, 0.3);
      transition: all 0.3s ease;
    }
    .filter-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
    }
    .modal-title {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
    }
    .modal-poster {
      border: 2px solid rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
      transition: transform 0.3s ease;
    }
    .modal-poster:hover {
      transform: scale(1.05);
    }
    .action-btn {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
      transition: all 0.3s ease;
    }
    .action-btn:hover {
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.7);
    }
    .secondary-btn {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid rgba(59, 130, 246, 0.3);
      transition: all 0.3s ease;
    }
    .secondary-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: #3b82f6;
    }
    .cast-card img {
      border: 1px solid rgba(59, 130, 246, 0.3);
      transition: transform 0.3s ease;
    }
    .cast-card img:hover {
      transform: scale(1.1);
    }
    .episode-card {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid rgba(59, 130, 246, 0.2);
      transition: all 0.3s ease;
    }
    .episode-card:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: #3b82f6;
      transform: translateY(-5px);
    }
    @media (max-width: 640px) {
      .logo-container img {
        height: 36px;
      }
      .header {
        padding: 12px 0;
      }
      .results-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
      .modal-content {
        padding: 16px;
      }
      .modal-poster {
        height: 240px;
      }
      .modal-cast {
        grid-template-columns: 1fr;
      }
      .episode-list {
        max-height: 240px;
      }
      .text-3xl {
        font-size: 1.5rem;
      }
      .text-xl {
        font-size: 1.125rem;
      }
      .text-sm {
        font-size: 0.875rem;
      }
      .text-xs {
        font-size: 0.75rem;
      }
      .search-bar {
        font-size: 0.875rem;
        padding: 10px;
      }
      .search-btn {
        padding: 0 20px;
        font-size: 0.875rem;
      }
      .score-container {
        width: 48px;
        height: 48px;
      }
      .score-container svg {
        width: 48px;
        height: 48px;
      }
      .score-container circle {
        cx: 24;
        cy: 24;
        r: 20;
        stroke-width: 4;
      }
      .score-text {
        font-size: 12px;
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
  <div id="offlineMessage" class="offline-message">Offline Mode: Using cached data. Limited features.</div>
  <header class="header w-full">
    <div class="w-full max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="logo-container">
        <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_2-d537fb228cf3ded904ef09b136fe3fec72548ebc1fea3fbbd1ad9e36364db38b.svg" alt="TMDB Logo" />
        <img src="https://fmfau.github.io/Images/Logo.png" alt="Logo" />
      </div>
      <div class="flex items-center gap-3">
        <button id="themeToggle" class="p-2 rounded-full secondary-btn text-white">
          <svg id="themeIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>
        <button id="watchRandomBtn" class="px-4 py-2 action-btn text-white rounded-lg">Random Pick</button>
        <button id="historyBtn" class="px-4 py-2 secondary-btn text-white rounded-lg">History</button>
        <button id="favouritesBtn" class="px-4 py-2 secondary-btn text-white rounded-lg">Favourites</button>
        <button id="recentlyWatchedBtn" class="px-4 py-2 secondary-btn text-white rounded-lg">Watched</button>
      </div>
    </div>
  </header>
  <main class="w-full max-w-7xl px-4 py-8">
    <div class="flex justify-center mb-6">
      <input id="searchInput" type="text" placeholder="Search movies or series..." class="search-bar w-full max-w-2xl p-4 rounded-l-lg text-white focus:ring-0 placeholder-gray-400" />
      <button id="searchBtn" class="search-btn px-6 text-white rounded-r-lg">Search</button>
    </div>
    <div id="filterSection" class="flex flex-wrap gap-3 mb-8 justify-center">
      <select id="mediaTypeFilter" class="filter-btn p-2 rounded-lg text-white">
        <option value="all">All Media</option>
        <option value="movie">Movies</option>
        <option value="tv">Series</option>
      </select>
      <select id="genreFilter" class="filter-btn p-2 rounded-lg text-white">
        <option value="">All Genres</option>
      </select>
      <select id="yearFilter" class="filter-btn p-2 rounded-lg text-white">
        <option value="">All Years</option>
      </select>
    </div>
    <div id="results" class="results-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </main>

  <div id="modal" class="modal-backdrop fixed inset-0 hidden">
    <div class="modal-content p-6 mx-4 my-8">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="modal-title text-3xl font-bold text-white"></h2>
        <div class="flex items-center gap-3">
          <div class="relative">
            <button id="favouriteBtn" class="p-2 rounded-full secondary-btn">
              <svg id="favouriteIcon" class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
              </svg>

          </div>
          <div class="relative">
            <button id="shareBtn" class="p-2 rounded-full action-btn">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
              </svg>
            </button>
            <span class="tooltip left-1/2">Share</span>
          </div>
          <div class="relative">
            <button id="streamBtn" class="p-2 rounded-full action-btn">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.2A1 1 0 0010 9.768v4.464a1 1 0 001.555.832l3.197-2.2a1 1 0 000-1.664z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </button>
            <span class="tooltip left-1/2">Stream</span>
          </div>
          <div class="relative">
            <button id="playTrailerBtn" class="p-2 rounded-full action-btn hidden">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.2A1 1 0 0010 9.768v4.464a1 1 0 001.555.832l3.197-2.2a1 1 0 000-1.664z" />
              </svg>
            </button>
            <span class="tooltip left-1/2">Trailer</span>
          </div>
          <div class="relative">
            <button id="closeModal" class="p-2 rounded-full secondary-btn">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <span class="tooltip left-1/2">Close</span>
          </div>
        </div>
      </div>
      <div class="flex flex-col md:flex-row gap-8 mb-8">
        <img id="modalPoster" class="modal-poster w-full md:w-1/3 h-[500px] object-cover rounded-lg" alt="Poster" />
        <div class="flex-1">
          <p id="modalDescription" class="text-gray-300 text-lg mb-6 leading-relaxed"></p>
          <div class="flex items-center mb-6">
            <div class="score-container mr-4 glow-effect">
              <svg class="score-ring w-full h-full">
                <circle cx="30" cy="30" r="26" fill="none" stroke="#2d3748" stroke-width="6"/>
                <circle id="modalScoreCircle" class="score-circle" cx="30" cy="30" r="26" fill="none" stroke="#4b5563" stroke-width="6" stroke-dasharray="0, 163"/>
              </svg>
              <span id="modalScore" class="score-text"></span>
            </div>
            <p id="modalRelease" class="text-gray-400 text-lg"></p>
          </div>
          <h3 class="text-xl font-semibold text-white mb-4">Cast</h3>
          <div id="modalCast" class="modal-cast grid grid-cols-2 md:grid-cols-3 gap-6 mb-6"></div>
        </div>
      </div>
      <div id="trailerSection" class="hidden mb-8">
        <h3 class="text-xl font-semibold text-white mb-4">Trailer</h3>
        <div class="relative w-full" style="padding-bottom: 56.25%;">
          <iframe id="trailerIframe" class="absolute top-0 left-0 w-full h-full rounded-lg" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
      <div id="episodeSection" class="hidden mb-8">
        <h3 class="text-xl font-semibold text-white mb-4">Episodes</h3>
        <div class="flex mb-4">
          <select id="seasonSelect" class="filter-btn w-full p-3 rounded-lg text-white"></select>
        </div>
        <div id="episodeList" class="episode-list grid gap-4"></div>
      </div>
    </div>
  </div>

          <button id="shareFacebook" class="px-4 py-2 bg-blue-700 text-white rounded-md hover:bg-blue-800 transition flex items-center gap-2">

        <h2 class="text-2xl font-bold text-white">Search History</h2>

          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />

    <div class="modal-content rounded-xl p-6 w-full max-w-md">

        <h2 class="text-2xl font-bold text-white">Favourites</h2>

          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

  <div id="recentlyWatchedModal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center z-50">
    <div class="modal-content rounded-xl p-6 w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold text-white">Recently Watched</h2>
        <button id="closeRecentlyWatchedModal" class="p-2 rounded-full secondary-btn">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <ul id="recentlyWatchedList" class="text-gray-300"></ul>
    </div>
  </div>

  <script>
    const apiKey = '9adc0bbf543673c5fb45ab24a36599e1';
    const streamBaseUrl = 'https://pstream.org/media/tmdb-';
    const baseShareUrl = 'https://streamverse.example/';
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('results');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalPoster = document.getElementById('modalPoster');
    const modalDescription = document.getElementById('modalDescription');
    const modalScore = document.getElementById('modalScore');
    const modalScoreCircle = document.getElementById('modalScoreCircle');
    const modalRelease = document.getElementById('modalRelease');
    const modalCast = document.getElementById('modalCast');
    const episodeSection = document.getElementById('episodeSection');
    const seasonSelect = document.getElementById('seasonSelect');
    const episodeList = document.getElementById('episodeList');
    const closeModal = document.getElementById('closeModal');
    const favouriteBtn = document.getElementById('favouriteBtn');
    const favouriteIcon = document.getElementById('favouriteIcon');
    const shareBtn = document.getElementById('shareBtn');
    const shareModal = document.getElementById('shareModal');
    const closeShareModal = document.getElementById('closeShareModal');
    const shareDiscord = document.getElementById('shareDiscord');
    const shareTwitter = document.getElementById('shareTwitter');
    const shareFacebook = document.getElementById('shareFacebook');
    const copyLink = document.getElementById('copyLink');
    const sharePreviewImage = document.getElementById('sharePreviewImage');
    const sharePreviewType = document.getElementById('sharePreviewType');
    const sharePreviewTitle = document.getElementById('sharePreviewTitle');
    const sharePreviewDescription = document.getElementById('sharePreviewDescription');
    const streamBtn = document.getElementById('streamBtn');
    const playTrailerBtn = document.getElementById('playTrailerBtn');
    const trailerSection = document.getElementById('trailerSection');
    const trailerIframe = document.getElementById('trailerIframe');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const historyBtn = document.getElementById('historyBtn');
    const historyModal = document.getElementById('historyModal');
    const closeHistoryModal = document.getElementById('closeHistoryModal');
    const historyList = document.getElementById('historyList');
    const favouritesBtn = document.getElementById('favouritesBtn');
    const favouritesModal = document.getElementById('favouritesModal');
    const closeFavouritesModal = document.getElementById('closeFavouritesModal');
    const favouritesList = document.getElementById('favouritesList');
    const recentlyWatchedBtn = document.getElementById('recentlyWatchedBtn');
    const recentlyWatchedModal = document.getElementById('recentlyWatchedModal');
    const closeRecentlyWatchedModal = document.getElementById('closeRecentlyWatchedModal');
    const recentlyWatchedList = document.getElementById('recentlyWatchedList');
    const watchRandomBtn = document.getElementById('watchRandomBtn');
    const similarSection = document.getElementById('similarSection');
    const similarResults = document.getElementById('similarResults');
    const ogImage = document.getElementById('ogImage');
    const ogTitle = document.getElementById('ogTitle');
    const ogDescription = document.getElementById('ogDescription');
    const offlineMessage = document.getElementById('offlineMessage');
    const mediaTypeFilter = document.getElementById('mediaTypeFilter');
    const genreFilter = document.getElementById('genreFilter');
    const yearFilter = document.getElementById('yearFilter');

    let currentItem = null;
    let selectedSeason = 1;
    let selectedEpisode = 1;
    let seasonsData = [];
    let episodeCache = {};
    let seasonIdCache = {};
    let episodeIdCache = {};
    let isOffline = false;
    let genres = { movie: [], tv: [] };
    let lastSearchResults = [];
    const CACHE_KEY = 'cachedMediaData';
    let isTrailerPlaying = false;

    const savedTheme = Cookies.get('theme') || 'dark';
    document.documentElement.classList.add(savedTheme);
    updateThemeIcon(savedTheme);

    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
      document.documentElement.classList.remove('dark', 'light');
      document.documentElement.classList.add(newTheme);
      Cookies.set('theme', newTheme, { expires: 365 });
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.innerHTML = theme === 'dark' ? 
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />' :
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
    }

    function checkOnlineStatus() {
      isOffline = !navigator.onLine;
      offlineMessage.style.display = isOffline ? 'block' : 'none';
      if (isOffline) {
        loadCachedData();
      }
    }

    window.addEventListener('online', checkOnlineStatus);
    window.addEventListener('offline', checkOnlineStatus);

    function cacheData(data) {
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    }

    function loadCachedData() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        displayResults(JSON.parse(cached));
      } else {
        resultsDiv.innerHTML = '<p class="text-center text-yellow-500 col-span-full">Offline mode: No cached data available.</p>';
      }
    }

    async function fetchGenres() {
      try {
        const [movieGenres, tvGenres] = await Promise.all([
          fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${apiKey}`).then(res => res.json()),
          fetch(`https://api.themoviedb.org/3/genre/tv/list?api_key=${apiKey}`).then(res => res.json())
        ]);
        genres.movie = movieGenres.genres;
        genres.tv = tvGenres.genres;
        populateGenreFilter();
      } catch (error) {
        console.error('Error fetching genres:', error);
      }
    }

    function populateGenreFilter() {
      const allGenres = [...new Set([...genres.movie, ...genres.tv].map(g => JSON.stringify(g)))].map(g => JSON.parse(g));
      genreFilter.innerHTML = '<option value="">All Genres</option>';
      allGenres.forEach(genre => {
        const option = document.createElement('option');
        option.value = genre.id;
        option.textContent = genre.name;
        genreFilter.appendChild(option);
      });
    }

    function populateYearFilter() {
      const currentYear = new Date().getFullYear();
      yearFilter.innerHTML = '<option value="">All Years</option>';
      for (let year = currentYear; year >= 1900; year--) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearFilter.appendChild(option);
      }
    }

    function displaySkeletonLoader() {
      resultsDiv.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        const card = document.createElement('div');
        card.className = 'card-glow relative rounded-lg overflow-hidden';
        card.innerHTML = `
          <div class="relative">
            <div class="w-full h-[480px] skeleton rounded-t-lg"></div>
            <div class="absolute bottom-3 right-3 w-14 h-14">
              <div class="w-full h-full skeleton rounded-full"></div>
            </div>
          </div>
          <div class="p-4">
            <div class="h-6 w-3/4 skeleton rounded mb-2"></div>
            <div class="h-4 w-1/2 skeleton rounded"></div>
          </div>
        `;
        resultsDiv.appendChild(card);
      }
    }

    async function fetchTrending() {
      if (isOffline) {
        loadCachedData();
        return;
      }
      displaySkeletonLoader();
      try {
        const allResults = [];
        for (let page = 1; page <= 3; page++) {
          const response = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${apiKey}&page=${page}`);
          const data = await response.json();
          allResults.push(...data.results);
        }
        lastSearchResults = allResults.slice(0, 50);
        cacheData(lastSearchResults);
        applyFilters();
      } catch (error) {
        resultsDiv.innerHTML = '<p class="text-center text-red-500 col-span-full">Error fetching trending content.</p>';
      }
    }

    searchBtn.addEventListener('click', () => searchMedia(searchInput.value));
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchMedia(searchInput.value);
    });

    async function searchMedia(query) {
      if (!query) return;
      if (isOffline) {
        loadCachedData();
        return;
      }
      resultsDiv.innerHTML = '<p class="text-center text-gray-400 col-span-full">Loading...</p>';
      saveSearchHistory(query);
      try {
        const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(query)}`);
        const data = await response.json();
        lastSearchResults = data.results;
        cacheData(lastSearchResults);
        applyFilters();
      } catch (error) {
        resultsDiv.innerHTML = '<p class="text-center text-red-500 col-span-full">Error fetching data.</p>';
      }
    }

    function applyFilters() {
      const mediaType = mediaTypeFilter.value;
      const genreId = genreFilter.value;
      const year = yearFilter.value;
      let filteredResults = lastSearchResults;

      if (mediaType !== 'all') {
        filteredResults = filteredResults.filter(item => item.media_type === mediaType);
      }
      if (genreId) {
        filteredResults = filteredResults.filter(item => item.genre_ids.includes(parseInt(genreId)));
      }
      if (year) {
        filteredResults = filteredResults.filter(item => {
          const releaseYear = new Date(item.release_date || item.first_air_date || 'N/A').getFullYear();
          return releaseYear === parseInt(year);
        });
      }
      displayResults(filteredResults);
    }

    mediaTypeFilter.addEventListener('change', applyFilters);
    genreFilter.addEventListener('change', applyFilters);
    yearFilter.addEventListener('change', applyFilters);

    function displayResults(results) {
      resultsDiv.innerHTML = '';
      if (results.length === 0) {
        resultsDiv.innerHTML = '<p class="text-center text-gray-400 col-span-full">No results found.</p>';
        return;
      }
      results.forEach(item => {
        if (item.media_type === 'movie' || item.media_type === 'tv') {
          const title = item.title || item.name;
          const releaseDate = item.release_date || item.first_air_date || 'N/A';
          const score = item.vote_average ? (item.vote_average).toFixed(1) : 'N/A';
          const scorePercent = score !== 'N/A' ? score * 10 : 0;
          const strokeColor = score !== 'N/A' ? getScoreColor(score) : '#4b5563';
          const poster = item.poster_path ? `https://image.tmdb.org/t/p/w300${item.poster_path}` : 'https://via.placeholder.com/300x450?text=No+Image';
          const badge = item.media_type === 'tv' ? '<span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-semibold px-3 py-1 rounded-full">Series</span>' : '<span class="absolute top-3 left-3 bg-green-600 text-white text-xs font-semibold px-3 py-1 rounded-full">Movie</span>';
          const card = document.createElement('div');
          card.className = 'card-glow relative rounded-lg overflow-hidden cursor-pointer';
          card.innerHTML = `
            <div class="relative">
              ${badge}
              <img src="${poster}" alt="${title}" class="w-full h-[480px] object-cover transition duration-300" />
              <div class="absolute bottom-3 right-3 w-14 h-14 glow-effect">
                <svg class="score-ring w-full h-full">
                  <circle cx="28" cy="28" r="24" fill="none" stroke="#2d3748" stroke-width="6"/>
                  <circle class="score-circle" cx="28" cy="28" r="24" fill="none" stroke="${strokeColor}" stroke-width="6" stroke-dasharray="${scorePercent * 1.5}, 150"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center text-sm font-semibold text-white">
                  ${score}
                </div>
              </div>
            </div>
            <div class="p-4">
              <h2 class="text-lg font-semibold truncate text-white" title="${title}">${title}</h2>
              <p class="text-sm text-gray-400">Release: ${releaseDate}</p>
            </div>
          `;
          card.addEventListener('click', () => openModal(item));
          resultsDiv.appendChild(card);
        }
      });
    }

    async function openModal(item, season = 1, episode = 1) {
      if (isOffline) {
        playTrailerBtn.classList.add('hidden');
      }
      currentItem = item;
      selectedSeason = season;
      selectedEpisode = episode;
      modal.classList.remove('hidden');
      window.scrollTo(0, 0);
      document.body.style.overflow = 'hidden';
      modalTitle.textContent = item.title || item.name;
      modalPoster.src = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
      modalDescription.textContent = item.overview || 'No description available.';
      modalRelease.textContent = `Release: ${item.release_date || item.first_air_date || 'N/A'}`;
      const score = item.vote_average ? (item.vote_average).toFixed(1) : 'N/A';
      modalScore.textContent = score;
      const scorePercent = score !== 'N/A' ? score * 10 : 0;
      const strokeColor = score !== 'N/A' ? getScoreColor(score) : '#4b5563';
      modalScoreCircle.setAttribute('stroke', strokeColor);
      modalScoreCircle.setAttribute('stroke-dasharray', `${scorePercent * 1.63}, 163`);

      trailerSection.classList.add('hidden');
      trailerIframe.src = '';
      isTrailerPlaying = false;

      const favourites = JSON.parse(Cookies.get('favourites') || '[]');
      const isFavourited = favourites.some(fav => fav.id === item.id && fav.media_type === item.media_type);
      favouriteIcon.classList.toggle('fill-current', isFavourited);
      favouriteIcon.classList.toggle('text-yellow-400', isFavourited);

      saveRecentlyWatched(item);

      if (!isOffline) {
        modalCast.innerHTML = '<p class="text-gray-400">Loading cast...</p>';
        try {
          const endpoint = item.media_type === 'movie' ? `movie/${item.id}` : `tv/${item.id}`;
          const response = await fetch(`https://api.themoviedb.org/3/${endpoint}/credits?api_key=${apiKey}`);
          const data = await response.json();
          displayCast(data.cast.slice(0, 8));
        } catch (error) {
          modalCast.innerHTML = '<p class="text-red-500">Error loading cast.</p>';
        }
      } else {
        modalCast.innerHTML = '<p class="text-yellow-500">Cast unavailable offline.</p>';
      }

      if (!isOffline) {
        try {
          const endpoint = item.media_type === 'movie' ? `movie/${item.id}` : `tv/${item.id}`;
          const response = await fetch(`https://api.themoviedb.org/3/${endpoint}/videos?api_key=${apiKey}`);
          const data = await response.json();
          const trailer = data.results.find(video => video.type === 'Trailer' && video.site === 'YouTube');
          if (trailer) {
            playTrailerBtn.classList.remove('hidden');
            playTrailerBtn.onclick = () => {
              if (isTrailerPlaying) {
                trailerSection.classList.add('hidden');
                trailerIframe.src = '';
                isTrailerPlaying = false;
              } else {
                trailerIframe.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                trailerSection.classList.remove('hidden');
                isTrailerPlaying = true;
              }
            };
          } else {
            playTrailerBtn.classList.add('hidden');
          }
        } catch (error) {
          playTrailerBtn.classList.add('hidden');
        }
      }

      if (item.media_type === 'tv' && !isOffline) {
        episodeSection.classList.remove('hidden');
        seasonSelect.innerHTML = '<option>Loading seasons...</option>';
        episodeList.innerHTML = '<p class="text-gray-400">Loading episodes...</p>';
        try {
          const response = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${apiKey}`);
          const data = await response.json();
          seasonsData = data.seasons.filter(season => season.season_number > 0);
          displaySeasons(seasonsData);
          await fetchEpisodes(item.id, selectedSeason);
        } catch (error) {
          episodeSection.innerHTML = '<p class="text-red-500">Error loading seasons.</p>';
        }
      } else {
        episodeSection.classList.add('hidden');
        if (isOffline) {
          episodeSection.innerHTML = '<p class="text-yellow-500">Episodes unavailable offline.</p>';
        }
      }

      await fetchSimilar(item.id, item.media_type);
    }

    function displaySeasons(seasons) {
      seasonSelect.innerHTML = '';
      seasons.forEach(season => {
        const option = document.createElement('option');
        option.value = season.season_number;
        option.textContent = `Season ${season.season_number}`;
        seasonSelect.appendChild(option);
      });
      seasonSelect.value = selectedSeason;
      seasonSelect.addEventListener('change', () => {
        selectedSeason = parseInt(seasonSelect.value);
        fetchEpisodes(currentItem.id, selectedSeason);
      });
    }

    async function fetchEpisodes(seriesId, seasonNumber) {
      try {
        const cacheKey = `${seriesId}_${seasonNumber}`;
        if (!episodeCache[cacheKey]) {
          const response = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/season/${seasonNumber}?api_key=${apiKey}`);
          const data = await response.json();
          episodeCache[cacheKey] = data;
          seasonIdCache[cacheKey] = data.id;
        }
        displayEpisodes(episodeCache[cacheKey].episodes);
      } catch (error) {
        episodeList.innerHTML = '<p class="text-red-500">Error loading episodes.</p>';
      }
    }

    async function getEpisodeDetails(seriesId, seasonNumber, episodeNumber) {
      const cacheKey = `${seriesId}_${seasonNumber}`;
      if (!episodeCache[cacheKey]) {
        const response = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/season/${seasonNumber}?api_key=${apiKey}`);
        episodeCache[cacheKey] = await response.json();
        seasonIdCache[cacheKey] = episodeCache[cacheKey].id;
      }
      const episode = episodeCache[cacheKey].episodes.find(ep => ep.episode_number === episodeNumber);
      if (episode) {
        episodeIdCache[`${seriesId}_${seasonNumber}_${episodeNumber}`] = episode.id;
        return { name: episode.name || 'Untitled', overview: episode.overview || 'No description available.' };
      }
      return { name: 'Untitled', overview: 'No description available.' };
    }

    function displayEpisodes(episodes) {
      episodeList.innerHTML = '';
      if (episodes.length === 0) {
        episodeList.innerHTML = '<p class="text-gray-400">No episodes available.</p>';
        return;
      }
      episodes.forEach(episode => {
        const thumbnail = episode.still_path ? `https://image.tmdb.org/t/p/w200${episode.still_path}` : 'https://via.placeholder.com/200x112?text=No+Thumbnail';
        const episodeCard = document.createElement('div');
        episodeCard.className = 'episode-card p-4 rounded-lg cursor-pointer flex items-center gap-4';
        episodeCard.innerHTML = `
          <img src="${thumbnail}" alt="Episode Thumbnail" class="w-32 h-18 object-cover rounded-md" />
          <div>
            <h4 class="text-sm font-semibold text-white">Episode ${episode.episode_number}: ${episode.name || 'Untitled'}</h4>
            <p class="text-xs text-gray-400">Aired: ${episode.air_date || 'N/A'}</p>
            <p class="text-xs text-gray-300 truncate">${episode.overview || 'No description available.'}</p>
          </div>
        `;
        episodeCard.addEventListener('click', () => {
          selectedEpisode = episode.episode_number;
          episodeList.querySelectorAll('div').forEach(card => card.classList.remove('ring-2', 'ring-blue-600'));
          episodeCard.classList.add('ring-2', 'ring-blue-600');
          episodeIdCache[`${currentItem.id}_${selectedSeason}_${selectedEpisode}`] = episode.id;
        });
        episodeList.appendChild(episodeCard);
      });
    }

    function displayCast(cast) {
      modalCast.innerHTML = '';
      if (cast.length === 0) {
        modalCast.innerHTML = '<p class="text-gray-400">No cast information available.</p>';
        return;
      }
      cast.forEach(actor => {
        const profile = actor.profile_path ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` : 'https://via.placeholder.com/185x278?text=No+Image';
        const actorCard = document.createElement('div');
        actorCard.className = 'cast-card';
        actorCard.innerHTML = `
          <img src="${profile}" alt="${actor.name}" class="w-full h-36 object-cover rounded-md mb-2" />
          <p class="text-sm font-semibold text-white">${actor.name}</p>
          <p class="text-xs text-gray-400">${actor.character || 'N/A'}</p>
        `;
        modalCast.appendChild(actorCard);
      });
    }

    closeModal.addEventListener('click', () => {
      modal.classList.add('hidden');
      document.body.style.overflow = '';
      trailerSection.classList.add('hidden');
      trailerIframe.src = '';
      isTrailerPlaying = false;
      similarSection.classList.add('hidden');
      resetOgTags();
    });

    favouriteBtn.addEventListener('click', () => {
      const favourites = JSON.parse(Cookies.get('favourites') || '[]');
      const isFavourited = favourites.some(fav => fav.id === currentItem.id && fav.media_type === currentItem.media_type);
      if (isFavourited) {
        const newFavourites = favourites.filter(fav => !(fav.id === currentItem.id && fav.media_type === currentItem.media_type));
        Cookies.set('favourites', JSON.stringify(newFavourites), { expires: 365 });
        favouriteIcon.classList.remove('fill-current', 'text-yellow-400');
      } else {
        favourites.push({
          id: currentItem.id,
          media_type: currentItem.media_type,
          title: currentItem.title || currentItem.name,
          poster_path: currentItem.poster_path
        });
        Cookies.set('favourites', JSON.stringify(favourites), { expires: 365 });
        favouriteIcon.classList.add('fill-current', 'text-yellow-400');
      }
      updateFavouritesModal();
    });

    streamBtn.addEventListener('click', async () => {
      if (!currentItem) return;
      if (isOffline) {
        alert('Streaming unavailable in offline mode.');
        return;
      }
      let streamUrl;
      if (currentItem.media_type === 'movie') {
        streamUrl = `${streamBaseUrl}movie-${currentItem.id}`;
      } else {
        const seasonCacheKey = `${currentItem.id}_${selectedSeason}`;
        const episodeCacheKey = `${currentItem.id}_${selectedSeason}_${selectedEpisode}`;
        let seasonId = seasonIdCache[seasonCacheKey];
        let episodeId = episodeIdCache[episodeCacheKey];
        if (!seasonId || !episodeId) {
          try {
            const response = await fetch(`https://api.themoviedb.org/3/tv/${currentItem.id}/season/${selectedSeason}?api_key=${apiKey}`);
            const seasonData = await response.json();
            seasonId = seasonData.id;
            const episode = seasonData.episodes.find(ep => ep.episode_number === selectedEpisode);
            episodeId = episode ? episode.id : null;
            seasonIdCache[seasonCacheKey] = seasonId;
            episodeIdCache[episodeCacheKey] = episodeId;
          } catch (error) {
            console.error('Error fetching episode details:', error);
            alert('Error fetching episode details. Please try again.');
            return;
          }
        }
        if (!episodeId) {
          alert('Episode not found.');
          return;
        }
        streamUrl = `${streamBaseUrl}tv-${currentItem.id}/${seasonId}/${episodeId}`;
      }
      window.open(streamUrl, '_blank');
    });

    async function updateShareModal() {
      shareModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      let shareUrl = `${baseShareUrl}?id=${currentItem.id}&type=${currentItem.media_type}`;
      let title = currentItem.title || currentItem.name;
      let type = currentItem.media_type === 'tv' ? 'Series' : 'Movie';
      let description = `${title} - Watch here at ${shareUrl}`;
      let image = currentItem.poster_path ? `https://image.tmdb.org/t/p/w500${currentItem.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
      if (currentItem.media_type === 'tv') {
        shareUrl += `&s=${selectedSeason}&e=${selectedEpisode}`;
        const episodeDetails = await getEpisodeDetails(currentItem.id, selectedSeason, selectedEpisode);
        title = `Series, S${selectedSeason}E${selectedEpisode}: ${episodeDetails.name}`;
        description = `${currentItem.name} - Watch here at ${shareUrl}`;
      }
      ogImage.setAttribute('content', image);
      ogTitle.setAttribute('content', title);
      ogDescription.setAttribute('content', description);
      sharePreviewImage.src = currentItem.poster_path ? `https://image.tmdb.org/t/p/w92${currentItem.poster_path}` : 'https://via.placeholder.com/92x138?text=No+Image';
      sharePreviewType.textContent = type;
      sharePreviewTitle.textContent = title;
      sharePreviewDescription.textContent = description;
      shareDiscord.onclick = () => {
        navigator.clipboard.writeText(shareUrl).then(() => {
          alert('Link copied! Paste it in Discord to share.');
          shareModal.classList.add('hidden');
          document.body.style.overflow = currentItem ? 'hidden' : '';
        });
      };
      shareTwitter.onclick = () => {
        const text = currentItem.media_type === 'tv' ? 
          `Watching ${currentItem.name} S${selectedSeason}E${selectedEpisode}: ${title.split(': ')[1]} on StreamVerse!` : 
          `Check out ${currentItem.title || currentItem.name} on StreamVerse!`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(shareUrl)}`, '_blank');
        shareModal.classList.add('hidden');
        document.body.style.overflow = currentItem ? 'hidden' : '';
      };
      shareFacebook.onclick = () => {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
        shareModal.classList.add('hidden');
        document.body.style.overflow = currentItem ? 'hidden' : '';
      };
      copyLink.onclick = () => {
        navigator.clipboard.writeText(shareUrl).then(() => {
          alert('Link copied to clipboard!');
          shareModal.classList.add('hidden');
          document.body.style.overflow = currentItem ? 'hidden' : '';
        });
      };
    }

    function resetOgTags() {
      ogImage.setAttribute('content', 'https://via.placeholder.com/500x750?text=StreamVerse');
      ogTitle.setAttribute('content', 'StreamVerse - Cinematic Universe');
      ogDescription.setAttribute('content', 'Immerse yourself in a cinematic universe with StreamVerse!');
    }

    shareBtn.addEventListener('click', updateShareModal);
    closeShareModal.addEventListener('click', () => {
      shareModal.classList.add('hidden');
      document.body.style.overflow = currentItem ? 'hidden' : '';
    });

    function getScoreColor(score) {
      const hue = (score * 12);
      return `hsl(${hue}, 70%, 50%)`;
    }

    function saveSearchHistory(query) {
      const history = JSON.parse(Cookies.get('searchHistory') || '[]');
      if (!history.includes(query)) {
        history.unshift(query);
        if (history.length > 10) history.pop();
        Cookies.set('searchHistory', JSON.stringify(history), { expires: 365 });
      }
      updateHistoryModal();
    }

    historyBtn.addEventListener('click', () => {
      updateHistoryModal();
      historyModal.classList.remove('hidden');
    });
    closeHistoryModal.addEventListener('click', () => {
      historyModal.classList.add('hidden');
    });

    function updateHistoryModal() {
      const history = JSON.parse(Cookies.get('searchHistory') || '[]');
      historyList.innerHTML = '';
      if (history.length === 0) {
        historyList.innerHTML = '<p>No search history.</p>';
        return;
      }
      history.forEach(query => {
        const li = document.createElement('li');
        li.className = 'cursor-pointer hover:text-blue-600 transition py-2';
        li.textContent = query;
        li.addEventListener('click', () => {
          searchInput.value = query;
          searchMedia(query);
          historyModal.classList.add('hidden');
        });
        historyList.appendChild(li);
      });
    }

    favouritesBtn.addEventListener('click', () => {
      updateFavouritesModal();
      favouritesModal.classList.remove('hidden');
    });
    closeFavouritesModal.addEventListener('click', () => {
      favouritesModal.classList.add('hidden');
    });

    async function updateFavouritesModal() {
      const favourites = JSON.parse(Cookies.get('favourites') || '[]');
      favouritesList.innerHTML = '';
      if (favourites.length === 0) {
        favouritesList.innerHTML = '<p>No favourites.</p>';
        return;
      }
      for (const fav of favourites) {
        const li = document.createElement('li');
        li.className = 'flex items-center gap-4 mb-2';
        const img = fav.poster_path ? `https://image.tmdb.org/t/p/w92${fav.poster_path}` : 'https://via.placeholder.com/92x138?text=No+Image';
        li.innerHTML = `
          <img src="${img}" alt="${fav.title}" class="w-12 h-18 object-cover rounded" />
          <span class="cursor-pointer hover:text-blue-600 transition">${fav.title}</span>
        `;
        li.addEventListener('click', async () => {
          try {
            if (isOffline) {
              openModal(fav);
              favouritesModal.classList.add('hidden');
              return;
            }
            const endpoint = fav.media_type === 'movie' ? `movie/${fav.id}` : `tv/${fav.id}`;
            const response = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${apiKey}`);
            const data = await response.json();
            data.media_type = fav.media_type;
            openModal(data);
            favouritesModal.classList.add('hidden');
          } catch (error) {
            console.error('Error fetching favorite details:', error);
            favouritesList.innerHTML = '<p class="text-red-500">Error loading favorite.</p>';
          }
        });
        favouritesList.appendChild(li);
      }
    }

    function saveRecentlyWatched(item) {
      const recentlyWatched = JSON.parse(Cookies.get('recentlyWatched') || '[]');
      const itemData = {
        id: item.id,
        media_type: item.media_type,
        title: item.title || item.name,
        poster_path: item.poster_path,
        release_date: item.release_date,
        first_air_date: item.first_air_date,
        vote_average: item.vote_average,
        genre_ids: item.genre_ids,
        overview: item.overview
      };
      const exists = recentlyWatched.some(watched => watched.id === item.id && watched.media_type === item.media_type);
      if (!exists) {
        recentlyWatched.unshift(itemData);
        if (recentlyWatched.length > 10) recentlyWatched.pop();
        Cookies.set('recentlyWatched', JSON.stringify(recentlyWatched), { expires: 365 });
      }
      updateRecentlyWatchedModal();
    }

    recentlyWatchedBtn.addEventListener('click', () => {
      updateRecentlyWatchedModal();
      recentlyWatchedModal.classList.remove('hidden');
    });
    closeRecentlyWatchedModal.addEventListener('click', () => {
      recentlyWatchedModal.classList.add('hidden');
    });

    async function updateRecentlyWatchedModal() {
      const recentlyWatched = JSON.parse(Cookies.get('recentlyWatched') || '[]');
      recentlyWatchedList.innerHTML = '';
      if (recentlyWatched.length === 0) {
        recentlyWatchedList.innerHTML = '<p>No recently watched items.</p>';
        return;
      }
      for (const watched of recentlyWatched) {
        const li = document.createElement('li');
        li.className = 'flex items-center gap-4 mb-2';
        const img = watched.poster_path ? `https://image.tmdb.org/t/p/w92${watched.poster_path}` : 'https://via.placeholder.com/92x138?text=No+Image';
        li.innerHTML = `
          <img src="${img}" alt="${watched.title}" class="w-12 h-18 object-cover rounded" />
          <span class="cursor-pointer hover:text-blue-600 transition">${watched.title}</span>
        `;
        li.addEventListener('click', async () => {
          try {
            if (isOffline) {
              openModal(watched);
              recentlyWatchedModal.classList.add('hidden');
              return;
            }
            const endpoint = watched.media_type === 'movie' ? `movie/${watched.id}` : `tv/${watched.id}`;
            const response = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${apiKey}`);
            const data = await response.json();
            data.media_type = watched.media_type;
            openModal(data);
            recentlyWatchedModal.classList.add('hidden');
          } catch (error) {
            console.error('Error fetching recently watched details:', error);
            recentlyWatchedList.innerHTML = '<p class="text-red-500">Error loading item.</p>';
          }
        });
        recentlyWatchedList.appendChild(li);
      }
    }

    async function handleDeepLink() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const type = params.get('type');
      const season = parseInt(params.get('s') || '1');
      const episode = parseInt(params.get('e') || '1');
      if (id && (type === 'movie' || type === 'tv')) {
        try {
          if (isOffline) {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
            const item = cached.find(i => i.id === parseInt(id) && i.media_type === type);
            if (item) {
              openModal(item, season, episode);
            }
            return;
          }
          const endpoint = type === 'movie' ? `movie/${id}` : `tv/${id}`;
          const response = await fetch(`https://api          .themoviedb.org/3/${endpoint}?api_key=${apiKey}`);
          const data = await response.json();
          data.media_type = type;
          openModal(data, season, episode);
        } catch (error) {
          console.error('Error fetching deep link data:', error);
          alert('Error loading item from link.');
        }
      }
    }

    watchRandomBtn.addEventListener('click', () => {
      if (isOffline) {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
        if (cached.length > 0) {
          const randomItem = cached[Math.floor(Math.random() * cached.length)];
          openModal(randomItem);
        } else {
          alert('No cached data available offline.');
        }
        return;
      }
      fetchTrending().then(() => {
        if (lastSearchResults.length > 0) {
          const randomItem = lastSearchResults[Math.floor(Math.random() * lastSearchResults.length)];
          openModal(randomItem);
        }
      });
    });
    
    // Initialize the app
    checkOnlineStatus();
    fetchGenres();
    populateYearFilter();
    fetchTrending();

    // Handle deep links on page load
    window.addEventListener('load', handleDeepLink);
  </script>
